name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Mirror of `lefthook.yml` so the local pre-commit gate and CI run the
# same checks. If you change one, change the other.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.24.3

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks
      - name: Scan working tree
        run: ./gitleaks dir . --no-banner --redact --exit-code 1

  quality-gate:
    name: Format / Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm exec vp fmt --check
      - name: Lint
        run: pnpm exec vp lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests
        run: pnpm exec vp test run --coverage
      - name: Build
        run: pnpm exec vp build
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage
          if-no-files-found: ignore

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report
          if-no-files-found: ignore
