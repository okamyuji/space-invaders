<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Invaders</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --fg: #fff;
        --accent: oklch(78% 0.22 145);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        height: 100%;
        overflow: hidden;
      }
      #app {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 0;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: var(--bg);
        /* Largest size that fits both viewport dimensions while keeping the
           498:280 aspect ratio. `min()` of width-bound and height-bound. */
        width: min(100vw, calc(100dvh * 498 / 280));
        height: auto;
        aspect-ratio: 498 / 280;
        display: block;
      }
      .hint {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        color: oklch(60% 0 0);
        font-size: 12px;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="498" height="280"></canvas>
    </div>
    <p class="hint">← / → : MOVE &nbsp;&nbsp; SPACE : FIRE &nbsp;&nbsp; ENTER : START</p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
